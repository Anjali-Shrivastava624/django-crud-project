{% extends 'students/base.html' %} {% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white py-3">
        <h5 class="mb-0">Confirm Delete</h5>
      </div>
      <div class="card-body text-center p-4">
        <i class="bi bi-person-x" style="font-size: 3rem; color: #dc3545"></i>
        <p class="fs-5 mt-3">
          Are you sure you want to permanently delete
          <strong>{{ student.name }}</strong>?
        </p>
        <p class="text-muted small">This action cannot be undone!</p>
        <form method="POST" class="d-flex justify-content-center gap-3 mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4">
            <i class="bi bi-trash"></i> Yes, Delete
          </button>
          <a href="{% url 'student_list' %}" class="btn btn-secondary px-4">
            <i class="bi bi-arrow-left"></i> Go Back
          </a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
